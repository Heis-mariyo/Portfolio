<header class="site-header" [class.site-header-scrolled]="isScrolled">
  <div class="nav-shell">
    <a routerLink="/" class="brand" aria-label="Go to home" (click)="closeMobileMenu()">
      <span class="brand-mark">M</span>
      <span class="brand-name">I</span>
    </a>

    <nav class="desktop-nav" aria-label="Primary navigation">
      <a routerLink="/" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Home</a>
      <a routerLink="/projects" routerLinkActive="nav-link-active" class="nav-link">Projects</a>
      <a routerLink="/contact" routerLinkActive="nav-link-active" class="nav-link">Contact</a>
    </nav>

    <button (click)="toggleMobileMenu()" class="menu-toggle" type="button" aria-label="Toggle navigation" [attr.aria-expanded]="isMobileMenuOpen">
      <span class="menu-line" [class.menu-line-open-top]="isMobileMenuOpen"></span>
      <span class="menu-line" [class.menu-line-open-mid]="isMobileMenuOpen"></span>
      <span class="menu-line" [class.menu-line-open-bottom]="isMobileMenuOpen"></span>
    </button>
  </div>

  <div class="mobile-dropdown" [class.mobile-dropdown-open]="isMobileMenuOpen" [attr.aria-hidden]="!isMobileMenuOpen">
    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a routerLink="/" (click)="closeMobileMenu()" routerLinkActive="mobile-link-active" [routerLinkActiveOptions]="{ exact: true }" class="mobile-link">Home</a>
      <a routerLink="/projects" (click)="closeMobileMenu()" routerLinkActive="mobile-link-active" class="mobile-link">Projects</a>
      <a routerLink="/contact" (click)="closeMobileMenu()" routerLinkActive="mobile-link-active" class="mobile-link">Contact</a>
    </nav>
  </div>
</header>
