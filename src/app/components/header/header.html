<header class="sticky top-4 left-0 w-full z-50 pointer-events-none">
<!-- Desktop: Single Centers Floating Pill (80% width) -->
  <div class="hidden md:flex pointer-events-auto mx-auto w-[80%] max-w-7xl h-16 rounded-full bg-white/80 backdrop-blur-xl shadow-lg border border-white/50 items-center justify-between px-6 transition-all duration-300">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2 group cursor-pointer text-decoration-none">
      <div class="h-9 w-9 rounded-full bg-slate-900 flex items-center justify-center text-primary font-serif font-bold text-xl shadow-md group-hover:scale-105 transition-transform">
        M
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="flex gap-8 text-sm font-medium text-slate-600 items-center justify-center">
      <a routerLink="/" routerLinkActive="text-slate-900 font-bold bg-slate-100/50 px-3 py-1 rounded-full" [routerLinkActiveOptions]="{exact: true}" class="hover:text-slate-900 transition-all">Home</a>
      <a routerLink="/about" routerLinkActive="text-slate-900 font-bold bg-slate-100/50 px-3 py-1 rounded-full" class="hover:text-slate-900 transition-all">About</a>
      <a routerLink="/projects" routerLinkActive="text-slate-900 font-bold bg-slate-100/50 px-3 py-1 rounded-full" class="hover:text-slate-900 transition-all">Projects</a>
      <a routerLink="/contact" routerLinkActive="text-slate-900 font-bold bg-slate-100/50 px-3 py-1 rounded-full" class="hover:text-slate-900 transition-all">Contact</a>
    </nav>

  </div>

  <!-- Mobile: Split Islands design with expanded right pill -->
  <div class="md:hidden flex w-full items-center px-4 gap-2">
    <!-- Left Island: Logo (Fixed) -->
    <a routerLink="/" class="pointer-events-auto h-12 w-12 flex-none rounded-full bg-slate-900 backdrop-blur-xl shadow-lg border border-white/80 flex items-center justify-center active:scale-95 transition-transform">
      <div class="font-serif font-bold text-xl text-primary">M</div>
    </a>

    <!-- Right Island: Text + Controls (Expanded) -->
    <div class="pointer-events-auto h-12 flex-1 rounded-full bg-white/80 backdrop-blur-xl shadow-lg border border-white/80 flex items-center justify-between px-2 pl-4">
     
      <!-- Controls -->
      <div class="flex items-center gap-2 flex-none">
        <!-- Hamburger Toggle -->
        <button (click)="toggleMobileMenu()" class="h-8 w-8 rounded-full flex items-center justify-center text-slate-700 hover:bg-slate-100 transition-colors focus:outline-none">
          <i class="fas" [class.fa-bars]="!isMobileMenuOpen" [class.fa-times]="isMobileMenuOpen"></i>
        </button>

      </div>
    </div>
  </div>

  <!-- Mobile Dropdown Menu (Floating below right island) -->
  @if (isMobileMenuOpen) {
  <div class="pointer-events-auto md:hidden absolute top-20 right-4 w-64 bg-white/80 backdrop-blur-xl rounded-2xl shadow-xl border border-white/30 animate-fade-in-down p-2 origin-top-right">
    <nav class="flex flex-col space-y-1">
      <div class="px-4 py-2 border-b border-slate-100 mb-1">
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Menu</span>
      </div>
      <a routerLink="/" (click)="closeMobileMenu()" routerLinkActive="bg-slate-100 text-slate-900 font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
        <i class="fas fa-home"></i> Home
      </a>
      <a routerLink="/about" (click)="closeMobileMenu()" routerLinkActive="bg-slate-100 text-slate-900 font-semibold" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
        <i class=""></i> About
      </a>
      <a routerLink="/projects" (click)="closeMobileMenu()" routerLinkActive="bg-slate-100 text-slate-900 font-semibold" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
        <i class=""></i> Projects
      </a>
      <a routerLink="/contact" (click)="closeMobileMenu()" routerLinkActive="bg-slate-100 text-slate-900 font-semibold" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
            <i class=""></i> Contact  
      </a>  
    </nav>
  </div>
  }
</header>
